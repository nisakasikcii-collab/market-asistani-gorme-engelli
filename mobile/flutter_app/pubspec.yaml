name: eyeshopper_ai
description: ES (Eyeshopper AI) — görme engelli kullanıcılar için market yardımcısı.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.15.2
  flutter_dotenv: ^5.1.0
  logger: ^2.4.0
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  shared_preferences: ^2.5.4
  cloud_firestore: ^5.6.12
  firebase_auth: ^5.7.0
  camera: ^0.12.0+1
  permission_handler: ^12.0.1
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_barcode_scanning: ^0.14.2
  google_mlkit_commons: ^0.11.0
  google_mlkit_object_detection: ^0.15.1
  google_mlkit_image_labeling: ^0.14.2
  dio: ^5.9.2
  http: ^1.6.0
  image: ^4.1.3
  sensors_plus: ^6.0.1
  audioplayers: ^6.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter:
    sdk: flutter
flutter:
  uses-material-design: true
  assets:
    - assets/config/
    - assets/sounds/
